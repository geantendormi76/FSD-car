nodes:
  - id: mock_perception_env
    path: uv
    args: run --with numpy --with pyarrow --with dora-rs==0.3.13 mock_perception_node.py
    inputs:
      control_cmd: fast_brain_nmpc/control_cmd
    outputs:
      - obstacle_force

  - id: fast_brain_nmpc
    path: /home/zhz/fsd-car/target/release/fast_brain_node
    build: cargo build -p core-control --release --bin fast_brain_node
    env:
      RUST_LOG: info
      LD_LIBRARY_PATH: /home/zhz/fsd-car/simulation-env/acados/lib:/home/zhz/fsd-car/simulation-env/c_generated_code
    inputs:
      obstacle_force: mock_perception_env/obstacle_force
    outputs:
      - control_cmd
