nodes:
  - id: isaac_sim_env
    path: /home/zhz/isaacsim/python.sh
    args: simulation-env/isaac_dora_node.py
    env:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      XDG_SESSION_TYPE: ${XDG_SESSION_TYPE}
      LD_LIBRARY_PATH: /home/zhz/isaacsim/kit/python/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.1/lib64
    inputs:
      control_cmd: ppo_brain_node/control_cmd
    outputs:
      - xfeat_features
      - obstacle_force
      - odometry
      - jpeg_image
  - id: slow_brain_mapper
    path: target/release/slow_brain_node
    build: cargo build -p core-decision --release --bin slow_brain_node
    env:
      RUST_LOG: info
    inputs:
      xfeat_features: isaac_sim_env/xfeat_features
      odometry: isaac_sim_env/odometry
    outputs:
      - human_prior
  - id: ppo_brain_node
    path: uv
    args: run --cache-dir /home/zhz/.cache/uv_clean simulation-env/ppo_brain_node.py
    inputs:
      odometry: isaac_sim_env/odometry
      obstacle_force: isaac_sim_env/obstacle_force
      human_prior: slow_brain_mapper/human_prior
    outputs:
      - control_cmd
  - id: telemetry_dashboard
    path: uv
    args: run --cache-dir /home/zhz/.cache/uv_clean showcase/src/bin/telemetry_dashboard.py
    env:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
    inputs:
      odometry: isaac_sim_env/odometry
      obstacle_force: isaac_sim_env/obstacle_force
      human_prior: slow_brain_mapper/human_prior
      control_cmd: ppo_brain_node/control_cmd
      jpeg_image: isaac_sim_env/jpeg_image
