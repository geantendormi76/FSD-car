# =================================================================
# 🛡️ FSD-car V3.1: 纯净度压测物理神经蓝图 (Zero-AI Sandbox)
# 核心目的: 验证 100Hz Isaac Sim 离屏渲染与 DORA 共享内存物理极限
# =================================================================
nodes:
  # ---------------------------------------------------------------
  # 🌌 1. 纯净物理仿真界 (100Hz Offscreen Capture)
  # ---------------------------------------------------------------
  - id: isaac_purity_env
    path: /home/zhz/isaacsim/python.sh
    args: simulation-env/isaac_purity_node.py
    env:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      XDG_SESSION_TYPE: ${XDG_SESSION_TYPE}
    inputs:
      control_cmd: sim_echo_diagnostic/control_cmd
    outputs:
      - obstacle_force

  # ---------------------------------------------------------------
  # ⚡ 2. 时序诊断 Echo 回传端
  # ---------------------------------------------------------------
  - id: sim_echo_diagnostic
    path: target/release/sim_echo_node
    build: cargo build -p core-control --release --bin sim_echo_node
    env:
      RUST_LOG: info
      LD_LIBRARY_PATH: /home/zhz/fsd-car/simulation-env/acados/lib:/home/zhz/fsd-car/simulation-env/c_generated_code
    inputs:
      obstacle_force: isaac_purity_env/obstacle_force
    outputs:
      - control_cmd